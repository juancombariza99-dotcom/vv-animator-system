<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Effect — Pure CSS/SVG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeIn   { to { opacity: 1; } }
  @keyframes drawFlat { to { stroke-dashoffset: 0; } }
  @keyframes drawCurve { to { stroke-dashoffset: 0; } }

  /* ── GRID & AXES ── */
  #grid  { opacity: 0; animation: fadeIn 0.8s ease 0.3s forwards; }
  #axes  { opacity: 0; animation: fadeIn 0.6s ease 0.7s forwards; }
  #day-labels { opacity: 0; animation: fadeIn 0.4s ease 0.9s forwards; }

  /* ── FLAT LINE (mediocre path) ── */
  #flat-line {
    fill: none;
    stroke: rgba(255,255,255,0.22);
    stroke-width: 1.5;
    stroke-dasharray: 625;
    stroke-dashoffset: 625;
    animation: drawFlat 1.3s ease-in-out 1.2s forwards;
  }

  /* ── COMPOUND CURVE ── */
  #compound-line {
    fill: none;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-dasharray: 1100;
    stroke-dashoffset: 1100;
    animation: drawCurve 2.8s cubic-bezier(0.25,0.46,0.45,0.94) 2.6s forwards;
  }

  /* ── LABELS & DOTS ── */
  #dot-start          { opacity: 0; animation: fadeIn 0.3s ease 1.1s forwards; }
  #dot-flat-end       { opacity: 0; animation: fadeIn 0.3s ease 2.6s forwards; }
  #lbl-flat           { opacity: 0; animation: fadeIn 0.5s ease 2.8s forwards; }
  #lbl-1pct           { opacity: 0; animation: fadeIn 0.6s ease 3.8s forwards; }
  #dot-ring           { opacity: 0; animation: fadeIn 0.5s ease 5.3s forwards; }
  #dot-compound-end   { opacity: 0; animation: fadeIn 0.3s ease 5.4s forwards; }
  #gap-group          { opacity: 0; animation: fadeIn 0.5s ease 5.6s forwards; }
  #multiplier         { opacity: 0; animation: fadeIn 0.7s ease 5.8s forwards; }
  #title-group        { opacity: 0; animation: fadeIn 0.9s ease 6.3s forwards; }
</style>
</head>
<body>
<svg viewBox="0 0 800 450" width="800" height="450">

  <!-- GRID -->
  <g id="grid">
    <line x1="80" y1="130" x2="700" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="80" y1="210" x2="700" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="80" y1="290" x2="700" y2="290" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="280" y1="50" x2="280" y2="375" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="490" y1="50" x2="490" y2="375" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </g>

  <!-- AXES -->
  <g id="axes">
    <line x1="80" y1="45" x2="80" y2="375" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <line x1="76" y1="370" x2="710" y2="370" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <polygon points="710,366 710,374 718,370" fill="rgba(255,255,255,0.18)"/>
    <polygon points="76,46 84,46 80,38" fill="rgba(255,255,255,0.18)"/>
    <text x="726" y="374" fill="rgba(255,255,255,0.3)" font-size="9" letter-spacing="0.12em">TIME</text>
    <text x="80" y="28" fill="rgba(255,255,255,0.3)" font-size="9" letter-spacing="0.12em" text-anchor="middle">OUTPUT</text>
  </g>

  <!-- DAY LABELS -->
  <g id="day-labels">
    <line x1="80" y1="370" x2="80" y2="377" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="80" y="388" fill="rgba(255,255,255,0.22)" font-size="8.5" text-anchor="middle">DAY 1</text>
    <line x1="390" y1="370" x2="390" y2="377" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="390" y="388" fill="rgba(255,255,255,0.22)" font-size="8.5" text-anchor="middle">DAY 180</text>
    <line x1="700" y1="370" x2="700" y2="377" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="700" y="388" fill="rgba(255,255,255,0.22)" font-size="8.5" text-anchor="middle">DAY 365</text>
  </g>

  <!-- START DOT -->
  <circle id="dot-start" cx="80" cy="358" r="4" fill="white"/>

  <!-- FLAT LINE -->
  <path id="flat-line" d="M 80,358 L 700,350"/>

  <!-- FLAT END DOT -->
  <circle id="dot-flat-end" cx="700" cy="350" r="3" fill="rgba(255,255,255,0.22)"/>

  <!-- NO GROWTH LABEL -->
  <text id="lbl-flat" x="560" y="340" fill="rgba(255,255,255,0.3)" font-size="9" letter-spacing="0.14em">NO GROWTH</text>

  <!-- COMPOUND CURVE -->
  <path id="compound-line" d="M 80,358 C 480,356 580,275 700,72"/>

  <!-- COMPOUND END GLOW + DOT -->
  <circle id="dot-ring" cx="700" cy="72" r="9" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="7"/>
  <circle id="dot-compound-end" cx="700" cy="72" r="4" fill="white"/>

  <!-- +1% DAILY LABEL -->
  <text id="lbl-1pct" x="498" y="224" fill="rgba(255,255,255,0.6)" font-size="10" letter-spacing="0.2em">+1% DAILY</text>

  <!-- GAP INDICATOR -->
  <g id="gap-group">
    <line x1="700" y1="78" x2="700" y2="344" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="4 4"/>
    <polygon points="697,84 703,84 700,76" fill="rgba(255,255,255,0.4)"/>
    <polygon points="697,338 703,338 700,346" fill="rgba(255,255,255,0.4)"/>
  </g>

  <!-- 37× -->
  <g id="multiplier">
    <text x="718" y="226" fill="white" font-size="30" font-weight="700" letter-spacing="-0.02em">37×</text>
    <text x="719" y="242" fill="rgba(255,255,255,0.35)" font-size="8" letter-spacing="0.2em">DIFFERENCE</text>
  </g>

  <!-- TITLE -->
  <g id="title-group">
    <text x="390" y="424" fill="rgba(255,255,255,0.85)" font-size="11" font-weight="600" letter-spacing="0.35em" text-anchor="middle">COMPOUND EFFECT</text>
    <text x="390" y="440" fill="rgba(255,255,255,0.25)" font-size="8" letter-spacing="0.2em" text-anchor="middle">1.01³⁶⁵ = 37.78</text>
  </g>

</svg>
</body>
</html>
