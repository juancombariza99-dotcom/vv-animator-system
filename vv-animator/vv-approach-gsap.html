<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Effect — GSAP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 800 450" width="800" height="450">

  <!-- GRID -->
  <g id="grid" opacity="0">
    <line x1="80" y1="130" x2="700" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="80" y1="210" x2="700" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="80" y1="290" x2="700" y2="290" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="280" y1="50" x2="280" y2="375" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    <line x1="490" y1="50" x2="490" y2="375" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </g>

  <!-- AXES -->
  <g id="axes" opacity="0">
    <line x1="80" y1="45" x2="80" y2="375" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <line x1="76" y1="370" x2="710" y2="370" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <polygon points="710,366 710,374 718,370" fill="rgba(255,255,255,0.18)"/>
    <polygon points="76,46 84,46 80,38" fill="rgba(255,255,255,0.18)"/>
    <text x="726" y="374" fill="rgba(255,255,255,0.3)" font-size="9" letter-spacing="0.12em">TIME</text>
    <text x="80" y="28" fill="rgba(255,255,255,0.3)" font-size="9" letter-spacing="0.12em" text-anchor="middle">OUTPUT</text>
  </g>

  <!-- DAY LABELS -->
  <g id="day-labels" opacity="0">
    <line x1="80" y1="370" x2="80" y2="377" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="80" y="388" fill="rgba(255,255,255,0.22)" font-size="8.5" text-anchor="middle">DAY 1</text>
    <line x1="390" y1="370" x2="390" y2="377" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="390" y="388" fill="rgba(255,255,255,0.22)" font-size="8.5" text-anchor="middle">DAY 180</text>
    <line x1="700" y1="370" x2="700" y2="377" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <text x="700" y="388" fill="rgba(255,255,255,0.22)" font-size="8.5" text-anchor="middle">DAY 365</text>
  </g>

  <!-- START DOT -->
  <circle id="dot-start" cx="80" cy="358" r="4" fill="white" opacity="0"/>

  <!-- FLAT LINE -->
  <path id="flat-line"
    d="M 80,358 L 700,350"
    fill="none"
    stroke="rgba(255,255,255,0.22)"
    stroke-width="1.5"
    stroke-dasharray="625"
    stroke-dashoffset="625"/>

  <!-- FLAT END DOT -->
  <circle id="dot-flat-end" cx="700" cy="350" r="3" fill="rgba(255,255,255,0.22)" opacity="0"/>

  <!-- NO GROWTH LABEL -->
  <text id="lbl-flat" x="560" y="340" opacity="0" fill="rgba(255,255,255,0.3)" font-size="9" letter-spacing="0.14em">NO GROWTH</text>

  <!-- COMPOUND CURVE -->
  <path id="compound-line"
    d="M 80,358 C 480,356 580,275 700,72"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"/>

  <!-- COMPOUND END GLOW + DOT -->
  <circle id="dot-ring" cx="700" cy="72" r="9" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="7" opacity="0"/>
  <circle id="dot-compound-end" cx="700" cy="72" r="4" fill="white" opacity="0"/>

  <!-- +1% DAILY LABEL -->
  <text id="lbl-1pct" x="498" y="224" opacity="0" fill="rgba(255,255,255,0.6)" font-size="10" letter-spacing="0.2em">+1% DAILY</text>

  <!-- GAP INDICATOR -->
  <line id="gap-line" x1="700" y1="78" x2="700" y2="344" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
  <polygon id="gap-arrow-top" points="697,84 703,84 700,76" fill="rgba(255,255,255,0.4)" opacity="0"/>
  <polygon id="gap-arrow-bot" points="697,338 703,338 700,346" fill="rgba(255,255,255,0.4)" opacity="0"/>

  <!-- 37× -->
  <g id="multiplier" opacity="0">
    <text x="718" y="226" fill="white" font-size="30" font-weight="700" letter-spacing="-0.02em">37×</text>
    <text x="719" y="242" fill="rgba(255,255,255,0.35)" font-size="8" letter-spacing="0.2em">DIFFERENCE</text>
  </g>

  <!-- TITLE -->
  <g id="title-group" opacity="0">
    <text x="390" y="424" fill="rgba(255,255,255,0.85)" font-size="11" font-weight="600" letter-spacing="0.35em" text-anchor="middle">COMPOUND EFFECT</text>
    <text x="390" y="440" fill="rgba(255,255,255,0.25)" font-size="8" letter-spacing="0.2em" text-anchor="middle">1.01³⁶⁵ = 37.78</text>
  </g>

</svg>

<script>
  // Compute true path length for compound curve
  const compoundPath = document.getElementById('compound-line');
  const compoundLen = Math.ceil(compoundPath.getTotalLength());
  compoundPath.setAttribute('stroke-dasharray', compoundLen);
  compoundPath.setAttribute('stroke-dashoffset', compoundLen);

  const ELEMENTS = [
    '#grid','#axes','#day-labels','#dot-start','#dot-flat-end','#lbl-flat',
    '#lbl-1pct','#dot-ring','#dot-compound-end','#gap-line',
    '#gap-arrow-top','#gap-arrow-bot','#multiplier','#title-group'
  ];

  function playScene() {
    // Reset state
    gsap.set(ELEMENTS, { opacity: 0, y: 0 });
    gsap.set('#flat-line', { strokeDashoffset: 625 });
    gsap.set('#compound-line', { strokeDashoffset: compoundLen });

    const tl = gsap.timeline({ onComplete: () => setTimeout(playScene, 2800) });

    tl
      // Scene builds
      .to('#grid',       { opacity: 1, duration: 0.8 })
      .to('#axes',       { opacity: 1, duration: 0.6 }, '-=0.4')
      .to('#day-labels', { opacity: 1, duration: 0.4 }, '-=0.2')

      // Origin dot
      .to('#dot-start',  { opacity: 1, duration: 0.3, ease: 'back.out(2)' })

      // Flat line draws (slow, boring on purpose)
      .to('#flat-line',  { strokeDashoffset: 0, duration: 1.3, ease: 'power1.inOut' }, '+=0.15')
      .to('#dot-flat-end', { opacity: 1, duration: 0.25 })
      .to('#lbl-flat',   { opacity: 1, duration: 0.5 })

      // Compound curve draws (starts slow, then accelerates)
      .to('#compound-line', {
        strokeDashoffset: 0,
        duration: 2.8,
        ease: 'power2.inOut'
      }, '+=0.4')

      // +1% label appears while curve is still drawing
      .to('#lbl-1pct', { opacity: 1, duration: 0.6 }, '-=1.8')

      // Terminus pulse
      .to('#dot-ring',         { opacity: 1, duration: 0.5, ease: 'power1.out' }, '-=0.15')
      .to('#dot-compound-end', { opacity: 1, duration: 0.3 }, '-=0.1')

      // Gap indicator
      .to('#gap-line',      { opacity: 1, duration: 0.5 }, '+=0.3')
      .to(['#gap-arrow-top','#gap-arrow-bot'], { opacity: 1, duration: 0.3, stagger: 0.1 }, '-=0.35')

      // 37× pop
      .fromTo('#multiplier',
        { opacity: 0, y: 10 },
        { opacity: 1, y: 0, duration: 0.6, ease: 'back.out(1.7)' },
        '-=0.1')

      // Title
      .to('#title-group', { opacity: 1, duration: 0.9 }, '+=0.4');
  }

  playScene();
</script>
</body>
</html>
